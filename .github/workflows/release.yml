name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for git describe --tags

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install system dependencies
        run: sudo apt-get install -y gawk curl iproute2

      - name: Build release binary
        run: make release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## xampp-tui ${{ github.ref_name }}

            ### Install

            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/xampp-tui-linux-amd64.tar.gz | tar xz
            sudo install -m 755 xampp-tui /usr/local/bin/
            ```

            Or clone the repo and run `make install`.

            ### Verify checksum

            ```bash
            sha256sum -c xampp-tui-linux-amd64.tar.gz.sha256
            ```
          files: |
            xampp-tui-linux-amd64.tar.gz
            xampp-tui-linux-amd64.tar.gz.sha256
