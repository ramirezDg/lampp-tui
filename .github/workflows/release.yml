name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: Test and vet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install system dependencies
        run: sudo apt-get install -y gawk curl iproute2

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for git describe --tags

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install system dependencies
        run: sudo apt-get install -y gawk curl iproute2

      - name: Build release binary
        run: make release

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" "${PREV_TAG}..HEAD" -- | grep -v "^- Merge")
          else
            COMMITS=$(git log --pretty=format:"- %s" -- | head -20 | grep -v "^- Merge")
          fi
          {
            echo 'NOTES<<EOF'
            echo "## Changes since ${PREV_TAG:-initial release}"
            echo ""
            echo "${COMMITS}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## xampp-tui ${{ github.ref_name }}

            ${{ steps.notes.outputs.NOTES }}

            ---

            ### Install

            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/xampp-tui-linux-amd64.tar.gz | tar xz
            sudo install -m 755 xampp-tui /usr/local/bin/
            ```

            Or clone the repo and run `make install`.

            ### Verify checksum

            ```bash
            sha256sum -c xampp-tui-linux-amd64.tar.gz.sha256
            ```
          files: |
            xampp-tui-linux-amd64.tar.gz
            xampp-tui-linux-amd64.tar.gz.sha256
            xampp-tui
